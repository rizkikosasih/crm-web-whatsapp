services:
  # ─── PHP-FPM (Laravel App) ───
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    container_name: crm-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php-local.ini:/usr/local/etc/php/conf.d/php-local.ini
    networks:
      - crm-network
    depends_on:
      db:
        condition: service_healthy

  # ─── Nginx (Web Server) ───
  webserver:
    image: nginx:stable-alpine
    container_name: crm-webserver
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8000}:80'
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - crm-network
    depends_on:
      - app

  # ─── MySQL Database ───
  db:
    image: mysql:8.0
    container_name: crm-db
    restart: unless-stopped
    ports:
      - '${DB_PORT:-3306}:3306'
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crm}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    volumes:
      - crm-db-data:/var/lib/mysql
    networks:
      - crm-network
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_PASSWORD:-secret}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Evolution API (WhatsApp Gateway) ───
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: crm-evolution-api
    restart: unless-stopped
    ports:
      - '${EVOLUTION_API_PORT:-8080}:8080'
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-your_evolution_api_key}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=mysql
      - DATABASE_CONNECTION_URI=mysql://root:${DB_PASSWORD:-secret}@db:3306/crm_evolution
      - CACHE_REDIS_ENABLED=false
    volumes:
      - crm-evolution-data:/evolution/data
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  crm-db-data:
    driver: local
  crm-evolution-data:
    driver: local
